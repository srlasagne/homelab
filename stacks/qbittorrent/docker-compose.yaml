services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ="Europe/Madrid"
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./config:/config
      - ../jellyfin/movies:/downloads/movies
      - ../jellyfin/series:/downloads/series
    ports:
      - 127.0.0.1:8080:8080
      - 172.30.30.10:6881:6881
      - 172.30.30.10:6881:6881/udp
    networks:
      - nginxpm
    restart: unless-stopped
networks:
  nginxpm:
    name: nginxpm
    external: true